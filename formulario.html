<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Sistema de Registro</a>

            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Inicio</a>
                <a class="nav-link active" href="formulario.html">Registro</a>
                <a class="nav-link" href="tablas.html">Usuarios</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">

        <div class="card shadow">

            <div class="card-header bg-primary text-white text-center">
                <h2>Formulario de Registro</h2>
            </div>
            <div class="card-body">
                <form id="formulario">
                    <div class="mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" class="form-control" id="nombre"
                            placeholder="Ingrese su nombre">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="correo"
                            placeholder="ejemplo@correo.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" class="form-control" id="telefono"
                            placeholder="3001234567">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Edad</label>
                        <input type="number" class="form-control" id="edad"
                            placeholder="Ingrese su edad">
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-success">
                            Registrar Usuario
                        </button>
                        <button type="button"
                            class="btn btn-secondary"
                            onclick="window.location.href='inicio.html'">
                            Volver al Inicio
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.getElementById("formulario").addEventListener("submit", function (e) {

            e.preventDefault();

            const nombre = document.getElementById("nombre").value.trim();
            const correo = document.getElementById("correo").value.trim();
            const telefono = document.getElementById("telefono").value.trim();
            const edad = document.getElementById("edad").value.trim();

            const regexNombre = /^[A-Za-zÁÉÍÓÚáéíóúñÑ ]{3,40}$/;
            const regexCorreo = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const regexTelefono = /^[0-9]{10}$/;

            if (!regexNombre.test(nombre)) {
                alert("Ingrese un nombre válido.");
                return;
            }
            if (!regexCorreo.test(correo)) {
                alert("Ingrese un correo válido.");
                return;
            }
            if (!regexTelefono.test(telefono)) {
                alert("El teléfono debe tener 10 dígitos.");
                return;
            }
            if (edad < 18 || edad > 100) {
                alert("La edad debe estar entre 18 y 100 años.");
                return;
            }
            let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
            usuarios.push({
                nombre,
                correo,
                telefono,
                edad
            });
            localStorage.setItem("usuarios", JSON.stringify(usuarios));
            alert("Usuario registrado correctamente.");
            window.location.href = "tablas.html";
        });
    </script>
</body>
</html>
